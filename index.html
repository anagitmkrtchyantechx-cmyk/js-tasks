<!DOCTYPE html>
<html>
<head>
  <title>Counter and Form Validation</title>
</head>
<body>
  <script type="module" src="main.js"></script>


  <h1>Counter</h1>
  <p id="countId"></p>
  <button id="incrementId">Increment</button>
  <button id="resetId">Reset</button>
  <h2>Form</h2>
  <form id="formId">
    <input type="text" id="nameInputId" placeholder="Enter at least 3 characters" />
    <button type="submit">Submit</button>
  </form>
  <p id="messageId"></p>
</body>
</html>
